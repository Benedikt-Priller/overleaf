# GitLab CI/CD Pipeline for Overleaf with Auto-Installing LaTeX
# This pipeline builds Docker images and publishes a Helm chart to GitLab Package Registry

stages:
  - validate
  - build
  - publish
  - test
  - helm

variables:
  GIT_DEPTH: "1"
  DOCKER_DRIVER: overlay2
  DOCKER_BUILDKIT: "1"
  BUILDKIT_PROGRESS: plain
  # Standard GitLab dind configuration.
  DOCKER_HOST: "tcp://docker:2375"
  DOCKER_TLS_CERTDIR: ""
  # Change these to your registry and namespace
  REGISTRY: "$CI_REGISTRY"
  IMAGE_PATH: "$CI_REGISTRY_IMAGE"
  IMAGE_BASE: "$CI_REGISTRY_IMAGE/sharelatex-base"
  IMAGE_FINAL: "$CI_REGISTRY_IMAGE/sharelatex"

validate:fast:
  stage: validate
  image: mikefarah/yq:4
  interruptible: true
  script:
    - yq e '.' .gitlab-ci.yml >/dev/null
    - yq e '.' helm/overleaf/Chart.yaml >/dev/null
    - |
      if [ -f helm/overleaf/values.yaml ]; then
        yq e '.' helm/overleaf/values.yaml >/dev/null
      else
        echo "Skipping helm/overleaf/values.yaml validation (file not present)"
      fi
    - |
      if grep -RInE 'https?://[^ ]*\./' .gitlab-ci.yml server-ce/Dockerfile-base; then
        echo "Found trailing-dot domain URL(s)."
        exit 1
      fi
  only:
    - branches
    - tags
    - merge_requests

validate:lint:
  stage: validate
  image: cytopia/yamllint:latest
  interruptible: true
  script:
    - |
      LINT_CONFIG='{extends: default, rules: {line-length: disable, truthy: disable}}'
      yamllint -d "$LINT_CONFIG" .gitlab-ci.yml helm/overleaf/Chart.yaml
      if [ -f helm/overleaf/values.yaml ]; then
        yamllint -d "$LINT_CONFIG" helm/overleaf/values.yaml
      else
        echo "Skipping helm/overleaf/values.yaml lint (file not present)"
      fi
  only:
    - branches
    - tags
    - merge_requests

.docker_build_template: &docker_build
  stage: build
  interruptible: true
  image: docker:24.0.0
  services:
    - name: docker:24.0.0-dind
      command:
        - "--max-concurrent-uploads=1"
        - "--storage-driver=overlay2"
        - "--log-driver=none"
  before_script:
    - apk add --no-cache git
    - until docker info >/dev/null 2>&1; do echo "Waiting for Docker daemon..."; sleep 2; done
    - echo "=== Pre-build aggressive cleanup ==="
    - |
      df -h /var/lib/docker || true
      docker system prune -af --volumes || true
      docker system df || true
      echo "Space available after pre-cleanup:"
      df -h /var/lib/docker || true
    - docker info
    - echo "Logging into registry $CI_REGISTRY"
    - |
      for attempt in 1 2 3; do
        if echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"; then
          break
        fi
        if [ "$attempt" -eq 3 ]; then
          echo "Docker login failed after 3 attempts"
          exit 1
        fi
        echo "Docker login failed, retrying in 5s (attempt $attempt/3)"
        sleep 5
      done
    - |
      docker_build_with_retry() {
        local dockerfile="$1"
        shift  # Remove first argument, rest are docker build args
        for attempt in 1 2 3 4; do
          if docker build -f "$dockerfile" "$@"; then
            return 0
          fi
          if [ "$attempt" -eq 4 ]; then
            echo "docker build failed after 4 attempts"
            return 1
          fi
          wait_seconds=$((attempt * 30))
          echo "docker build failed, retrying in ${wait_seconds}s (attempt $attempt/4)"
          sleep "$wait_seconds"
        done
      }
    - |
      push_repo_with_retry() {
        repo="$1"
        for attempt in 1 2 3 4 5 6 7 8; do
          if docker push --all-tags "$repo"; then
            return 0
          fi
          if [ "$attempt" -eq 8 ]; then
            echo "docker push failed for repository $repo after 8 attempts"
            return 1
          fi
          wait_seconds=$((attempt * 15))
          echo "docker push failed for repository $repo, retrying in ${wait_seconds}s (attempt $attempt/8)"
          sleep "$wait_seconds"
        done
      }
  after_script:
    - |
      echo "=== Docker Cleanup: Pre-cleanup disk usage ==="
      df -h /var/lib/docker || true
      docker system df || true
      echo "=== Stopping and removing all containers ==="
      CONTAINERS=$(docker ps -aq)
      if [ -n "$CONTAINERS" ]; then
        docker stop $CONTAINERS || true
        docker rm -f $CONTAINERS || true
      else
        echo "No containers to stop/remove"
      fi
      echo "=== Removing all dangling images and volumes ==="
      docker system prune -af --volumes || true
      echo "=== Docker Cleanup: Post-cleanup disk usage ==="
      df -h /var/lib/docker || true
      docker system df || true
      echo "=== Logging out from registry ==="
      docker logout $CI_REGISTRY || true

# Build base image with standard packages
build:base:
  <<: *docker_build
  script:
    - echo "Building base Docker image..."
    - |
      docker pull "$IMAGE_BASE:latest" || true
      docker_build_with_retry server-ce/Dockerfile-base \
        --cache-from "$IMAGE_BASE:latest" \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        --build-arg TEXLIVE_MIRROR=https://mirror.ox.ac.uk/sites/ctan.org/systems/texlive/tlnet \
        -t "$IMAGE_BASE:$CI_COMMIT_SHA" \
        -t "$IMAGE_BASE:latest" \
        -t "$IMAGE_BASE:$CI_COMMIT_REF_SLUG" \
        .
    - push_repo_with_retry "$IMAGE_BASE"
  only:
    changes:
      - "server-ce/Dockerfile-base"
      - "server-ce/config/latexmkrc"
      - "server-ce/bin/*-autoinst"
      - ".gitlab-ci.yml"
  artifacts:
    reports:
      dotenv: build.env
  after_script:
    - echo "BASE_IMAGE_TAG=$CI_COMMIT_SHA" >> build.env
    - docker logout $CI_REGISTRY

# Build final image with all services
build:final:
  <<: *docker_build
  needs:
    - job: build:base
      optional: true
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - "services/**/*"
        - "server-ce/**/*"
        - "libraries/**/*"
        - "package.json"
        - "patches/**/*"
        - ".gitlab-ci.yml"
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - "services/**/*"
        - "server-ce/**/*"
        - "libraries/**/*"
        - "package.json"
        - "patches/**/*"
        - ".gitlab-ci.yml"
    - if: '$CI_COMMIT_BRANCH'
      changes:
        - "services/**/*"
        - "server-ce/**/*"
        - "libraries/**/*"
        - "package.json"
        - "patches/**/*"
        - ".gitlab-ci.yml"
    - when: never
  script:
    - echo "Building final Docker image..."
    - |
      BASE_IMAGE_TAG="$IMAGE_BASE:$CI_COMMIT_SHA"
      if ! docker pull "$BASE_IMAGE_TAG" >/dev/null 2>&1; then
        BASE_IMAGE_TAG="$IMAGE_BASE:latest"
      fi
      docker pull "$BASE_IMAGE_TAG" || true
      docker pull "$IMAGE_FINAL:latest" || true
      docker_build_with_retry server-ce/Dockerfile \
        --cache-from "$IMAGE_FINAL:latest" \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        --build-arg OVERLEAF_BASE_TAG="$BASE_IMAGE_TAG" \
        -t "$IMAGE_FINAL:$CI_COMMIT_SHA" \
        -t "$IMAGE_FINAL:latest" \
        -t "$IMAGE_FINAL:$CI_COMMIT_REF_SLUG" \
        .
    - push_repo_with_retry "$IMAGE_FINAL"
# Build with custom packages (optional, triggered by custom-packages changes)
build:custom:
  <<: *docker_build
  needs:
    - build:base
  script:
    - echo "Building image with custom packages..."
    - |
      if [ -f ".custom-packages" ]; then
        PACKAGES=$(grep -v '^\s*#' .custom-packages | grep -v '^\s*$' | tr '\n' ' ')
        echo "Custom packages: $PACKAGES"
        TEMP_DOCKERFILE=$(mktemp)
        cat server-ce/Dockerfile-base > "$TEMP_DOCKERFILE"
        if [ -n "$PACKAGES" ]; then
          printf '\nRUN tlmgr install --repository ${TEXLIVE_MIRROR} \\\n' >> "$TEMP_DOCKERFILE"
          for pkg in $PACKAGES; do
            echo "      $pkg \\" >> "$TEMP_DOCKERFILE"
          done
          sed -i '$ s/ \\$//' "$TEMP_DOCKERFILE"
        fi
        docker pull "$IMAGE_BASE:custom-latest" || true
        docker_build_with_retry "$TEMP_DOCKERFILE" \
          --cache-from "$IMAGE_BASE:custom-latest" \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          --build-arg TEXLIVE_MIRROR=https://mirror.ox.ac.uk/sites/ctan.org/systems/texlive/tlnet \
          -t "$IMAGE_BASE:custom-$CI_COMMIT_SHA" \
          -t "$IMAGE_BASE:custom-latest" \
          .
        docker pull "$IMAGE_FINAL:custom-latest" || true
        docker_build_with_retry server-ce/Dockerfile \
          --cache-from "$IMAGE_FINAL:custom-latest" \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          --build-arg OVERLEAF_BASE_TAG="$IMAGE_BASE:custom-$CI_COMMIT_SHA" \
          -t "$IMAGE_FINAL:custom-$CI_COMMIT_SHA" \
          -t "$IMAGE_FINAL:custom-latest" \
          .
        push_repo_with_retry "$IMAGE_BASE"
        push_repo_with_retry "$IMAGE_FINAL"
        rm "$TEMP_DOCKERFILE"
      fi
  only:
    changes:
      - ".custom-packages"

# Publish Helm chart to GitLab Package Registry
publish:helm:
  stage: publish
  image: alpine:latest
  before_script:
    - apk add --no-cache curl grep git bash openssl
    - curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  script:
    - echo "Packaging Helm chart..."
    - |
      cd helm/overleaf
      sed -i "s/version: .*/version: 0.1.0-$CI_COMMIT_SHORT_SHA/" Chart.yaml
      sed -i "s/appVersion: .*/appVersion: $CI_COMMIT_SHORT_SHA/" Chart.yaml
      if [ -f values.yaml ]; then
        sed -i "s|^registry:.*|registry: $REGISTRY|" values.yaml
        sed -i "s|^repository:.*|repository: $IMAGE_PATH/sharelatex|" values.yaml
        sed -i "s|^tag:.*|tag: $CI_COMMIT_SHORT_SHA|" values.yaml
      else
        echo "Skipping values.yaml update (file not present)"
      fi
      helm package . --destination ../../
      cd /builds/$CI_PROJECT_PATH
    - echo "Publishing to Package Registry..."
    - |
      CHART_FILE=$(ls overleaf-0.1.0-*.tgz)
      curl -u gitlab-ci-token:"$CI_JOB_TOKEN" \
        -F chart=@"$CHART_FILE" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/helm/api/stable/charts"
  dependencies: []
  only:
    - tags
    - main

# Performance test - compile a test document
test:compile:
  stage: test
  image: docker:24.0.0
  services:
    - name: docker:24.0.0-dind
      command:
        - "--max-concurrent-uploads=1"
        - "--storage-driver=overlay2"
        - "--log-driver=none"
  before_script:
    - until docker info >/dev/null 2>&1; do echo "Waiting for Docker daemon..."; sleep 2; done
    - echo "=== Pre-test aggressive cleanup ==="
    - |
      df -h /var/lib/docker || true
      docker system prune -af --volumes || true
      docker system df || true
      echo "Space available after pre-cleanup:"
      df -h /var/lib/docker || true
    - |
      for attempt in 1 2 3; do
        if echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"; then
          break
        fi
        if [ "$attempt" -eq 3 ]; then
          echo "Docker login failed after 3 attempts"
          exit 1
        fi
        echo "Docker login failed, retrying in 5s (attempt $attempt/3)"
        sleep 5
      done
  needs:
    - job: build:final
      optional: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - "services/**/*"
        - "server-ce/**/*"
        - "libraries/**/*"
        - "package.json"
        - "patches/**/*"
        - ".gitlab-ci.yml"
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - "services/**/*"
        - "server-ce/**/*"
        - "libraries/**/*"
        - "package.json"
        - "patches/**/*"
        - ".gitlab-ci.yml"
    - when: never
  script:
    - echo "Testing LaTeX compilation with auto-install..."
    - |
      pull_with_retry() {
        image="$1"
        for attempt in 1 2 3 4 5; do
          if docker pull "$image"; then
            return 0
          fi
          if [ "$attempt" -eq 5 ]; then
            echo "docker pull failed for $image after 5 attempts"
            return 1
          fi
          wait_seconds=$((attempt * 15))
          echo "docker pull failed for $image, retrying in ${wait_seconds}s (attempt $attempt/5)"
          sleep "$wait_seconds"
        done
      }

      pull_with_retry "$IMAGE_FINAL:$CI_COMMIT_SHA"

      OUT_DIR="$CI_PROJECT_DIR/test-compile"
      mkdir -p "$OUT_DIR"

      CONTAINER_EXIT_CODE=0
      docker run --name ci-test-compile --rm \
        -v "$OUT_DIR:/out" \
        --entrypoint /bin/sh \
        "$IMAGE_FINAL:$CI_COMMIT_SHA" \
        -ec '
          cd /out
          printf "%s\n" \
            "\\documentclass{article}" \
            "\\usepackage{siunitx}" \
            "\\title{AutoInstall Test}" \
            "\\author{GitLab CI}" \
            "\\begin{document}" \
            "\\maketitle" \
            "\\section{Introduction}" \
            "Testing automatic package installation for siunitx: \\\\num{12345.678}." \
            "\\end{document}" > test.tex
          /usr/local/bin/pdflatex-autoinst -interaction=nonstopmode -halt-on-error test.tex > /out/container.log 2>&1
        ' || CONTAINER_EXIT_CODE=$?

      echo "Test container exit code: $CONTAINER_EXIT_CODE"

      if [ "$CONTAINER_EXIT_CODE" = "0" ] && [ -s "$OUT_DIR/test.pdf" ]; then
        echo "Compilation successful!"
        ls -lh "$OUT_DIR/test.pdf"
      else
        echo "Compilation failed"
        echo "Container exit code: $CONTAINER_EXIT_CODE"
        if [ -f "$OUT_DIR/container.log" ]; then
          echo "=== Last 200 lines of container.log ==="
          tail -n 200 "$OUT_DIR/container.log" || true
        fi
        if [ -f "$OUT_DIR/test.log" ]; then
          echo "=== Last 200 lines of test.log ==="
          tail -n 200 "$OUT_DIR/test.log" || true
        fi
        exit 1
      fi
  after_script:
    - |
      echo "=== Docker Cleanup: Pre-cleanup disk usage ==="
      df -h /var/lib/docker || true
      docker system df || true
      echo "=== Stopping and removing all containers ==="
      CONTAINERS=$(docker ps -aq)
      if [ -n "$CONTAINERS" ]; then
        docker stop $CONTAINERS || true
        docker rm -f $CONTAINERS || true
      else
        echo "No containers to stop/remove"
      fi
      echo "=== Removing all dangling images and volumes ==="
      docker system prune -af --volumes || true
      echo "=== Docker Cleanup: Post-cleanup disk usage ==="
      df -h /var/lib/docker || true
      docker system df || true
      echo "=== Logging out from registry ==="
      docker logout $CI_REGISTRY || true
  artifacts:
    paths:
      - test-compile/test.pdf
      - test-compile/test.log
    expire_in: 1 week
# SAST Security scanning
security:container-scan:
  stage: publish
  image: ghcr.io/aquasecurity/trivy:latest
  needs:
    - job: build:final
      optional: true
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - "services/**/*"
        - "server-ce/**/*"
        - "libraries/**/*"
        - "package.json"
        - "patches/**/*"
        - ".gitlab-ci.yml"
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - "services/**/*"
        - "server-ce/**/*"
        - "libraries/**/*"
        - "package.json"
        - "patches/**/*"
        - ".gitlab-ci.yml"
    - when: never
  script:
    - trivy image --username "$CI_REGISTRY_USER" --password "$CI_REGISTRY_PASSWORD" --severity HIGH,CRITICAL "$IMAGE_FINAL:$CI_COMMIT_SHA"
  allow_failure: true
