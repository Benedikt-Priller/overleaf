apiVersion: v1
kind: ConfigMap
metadata:
  name: overleaf-packages
  namespace: overleaf
data:
  # List of packages to pre-install
  # This ConfigMap can be used by a sidecar installation job
  packages.txt: |
    glossaries
    minted
    babel
    beamer
    booktabs
    listings
    microtype
    tikz
    xcolor
    amsmath
    amssymb

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: overleaf-config
  namespace: overleaf
data:
  # Custom latexmkrc for project-level overrides
  # Mount this into the project volumes if needed
  latexmkrc: |
    # Example project-level latexmkrc
    $go_mode = 3;
    $pdflatex = 'pdflatex-autoinst %O %S';
    
    # Bibtex configuration
    $bibtex = 'bibtex %O %B';
    
    # Run latexmk up to 5 times
    $max_repeat = 5;

---
apiVersion: batch/v1
kind: Job
metadata:
  name: overleaf-install-packages
  namespace: overleaf
spec:
  template:
    spec:
      # Reference the same image as the main deployment
      containers:
      - name: installer
        # Use your custom image
        image: sharelatex/sharelatex:latest
        imagePullPolicy: IfNotPresent
        
        command: ["/bin/bash"]
        args:
        - -c
        - |
          set -e
          
          # Mirror to use
          MIRROR="https://mirror.ox.ac.uk/sites/ctan.org/systems/texlive/tlnet"
          
          # List of packages to install (from ConfigMap)
          PACKAGES="glossaries minted babel beamer booktabs listings microtype tikz xcolor amsmath amssymb"
          
          echo "Starting TeX Live package installation..."
          
          for pkg in $PACKAGES; do
            echo "Installing: $pkg"
            tlmgr install --repository "$MIRROR" "$pkg" 2>&1 || {
              echo "Warning: Failed to install $pkg, continuing..."
              continue
            }
          done
          
          echo "Package installation complete!"
          tlmgr path add
          echo "TeX Live paths updated"
        
        env:
        - name: TEXLIVE_MIRROR
          value: "https://mirror.ox.ac.uk/sites/ctan.org/systems/texlive/tlnet"
        
        volumeMounts:
        - name: texlive-shared
          mountPath: /usr/local/texlive
      
      volumes:
      - name: texlive-shared
        persistentVolumeClaim:
          claimName: overleaf-texlive-pvc
      
      restartPolicy: Never
  
  backoffLimit: 3

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: overleaf-pdb
  namespace: overleaf
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: overleaf

---
apiVersion: v1
kind: Secret
metadata:
  name: overleaf-secrets
  namespace: overleaf
type: Opaque
stringData:
  # If using external MongoDB
  mongo-url: "mongodb://user:password@mongo.example.com:27017/sharelatex"
  
  # If using external Redis
  redis-url: "redis://user:password@redis.example.com:6379"

---
# Example NetworkPolicy to restrict ingress/egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: overleaf-netpol
  namespace: overleaf
spec:
  podSelector:
    matchLabels:
      app: overleaf
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 80
  egress:
  # Allow DNS
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: UDP
      port: 53
  # Allow access to TeX Live mirrors (CTAN)
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 443  # HTTPS
    - protocol: TCP
      port: 80   # HTTP
  # Allow access to internal services (MongoDB, Redis, etc.)
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 27017  # MongoDB
    - protocol: TCP
      port: 6379   # Redis
