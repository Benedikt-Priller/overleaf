apiVersion: v1
kind: Namespace
metadata:
  name: overleaf
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: overleaf-texlive-pvc
  namespace: overleaf
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi  # TeX Live + packages take ~6-8GB
  storageClassName: standard  # Adjust to your storage class
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: overleaf-data-pvc
  namespace: overleaf
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi  # For user projects and data
  storageClassName: standard
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: overleaf
  namespace: overleaf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: overleaf
  template:
    metadata:
      labels:
        app: overleaf
    spec:
      containers:
      - name: overleaf
        # Use your custom image with pre-installed packages
        # image: your-registry.azurecr.io/sharelatex-custom:latest
        # If using default image, use this instead:
        image: sharelatex/sharelatex:latest
        
        imagePullPolicy: IfNotPresent
        
        ports:
        - containerPort: 80
          name: http
        
        env:
        # TeX Live configuration
        - name: TEXLIVE_MIRROR
          value: "https://mirror.ox.ac.uk/sites/ctan.org/systems/texlive/tlnet"
        
        # Overleaf specific settings
        - name: NODE_ENV
          value: "production"
        
        - name: SHARELATEX_MONGO_URL
          valueFrom:
            secretKeyRef:
              name: overleaf-secrets
              key: mongo-url
              optional: true
        
        - name: SHARELATEX_REDIS_URL
          valueFrom:
            secretKeyRef:
              name: overleaf-secrets
              key: redis-url
              optional: true
        
        - name: SHARELATEX_EMAIL_FROM_ADDRESS
          value: "info@overleaf.example.com"
        
        - name: SHARELATEX_SECURE_COOKIE
          value: "true"
        
        volumeMounts:
        # Mount persistent TeX Live to cache installed packages
        - name: texlive-cache
          mountPath: /usr/local/texlive
        
        # Mount persistent data directory
        - name: overleaf-data
          mountPath: /var/lib/overleaf/data
        
        # Mount TeX Live cache/var directory
        - name: texmf-var
          mountPath: /var/lib/overleaf/tmp/texmf-var
        
        resources:
          requests:
            # Compilation can be CPU intensive
            memory: "2Gi"
            cpu: "1000m"  # 1 CPU per instance
          limits:
            memory: "4Gi"
            cpu: "2000m"   # Allow bursting up to 2 CPUs
        
        livenessProbe:
          httpGet:
            path: /health_check
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health_check
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      
      volumes:
      - name: texlive-cache
        persistentVolumeClaim:
          claimName: overleaf-texlive-pvc
      
      - name: overleaf-data
        persistentVolumeClaim:
          claimName: overleaf-data-pvc
      
      - name: texmf-var
        emptyDir: {}
      
      # Image pull secrets if using private registry
      # imagePullSecrets:
      # - name: regcred

---
apiVersion: v1
kind: Service
metadata:
  name: overleaf-service
  namespace: overleaf
spec:
  type: LoadBalancer  # Or ClusterIP/NodePort depending on your setup
  selector:
    app: overleaf
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: overleaf-hpa
  namespace: overleaf
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: overleaf
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
